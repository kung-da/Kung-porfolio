    <!-- ─── Google Fonts: Preconnect ─────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      TASK 1 FIX: Chỉ load những font thực sự dùng trong tailwind.config.ts
      REMOVED: Share Tech Mono (replaced by Inter + JetBrains Mono)
      FIXED:   Noto+Sans+JP → Noto+Serif+JP (config dùng "Noto Serif JP" không phải Sans)

      Font roles:
        Inter          → font-sans  (body prose, descriptions)
        JetBrains Mono → font-mono  (code, tech tags, data values)
        Orbitron       → font-display (H1 hero, large decorative)
        Rajdhani       → font-title  (H2, H3, nav, card titles)
        Noto Serif JP  → font-jp    (kanji/JP decorative accents)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!--
      Preload the 2 most critical fonts to avoid FOUT on first paint.
      Inter = body text (appears immediately everywhere)
      Orbitron = hero title (above the fold, large impact)
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap"
    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
